<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm & Sea — Fresh Catch</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

.hero {
  position: relative;
  height: 90vh;
  background: url('YOUR_TACO_IMAGE_1.jpg') center/cover no-repeat;
}

.overlay {
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
}

.hero-content {
  position: absolute;
  bottom: 40px;
  left: 20px;
}

h1 {
  font-size: 36px;
  margin: 0;
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 20px;
  background: #22c55e;
  color: black;
  text-decoration: none;
  font-weight: bold;
  border-radius: 6px;
}

.section {
  padding: 30px 20px;
}

.image {
  width: 100%;
  border-radius: 10px;
}

.features {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.feature {
  background: #1e293b;
  padding: 15px;
  border-radius: 8px;
}

.actions a {
  display: block;
  margin: 10px 0;
  padding: 15px;
  text-align: center;
  background: #38bdf8;
  color: black;
  text-decoration: none;
  border-radius: 6px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>Farm & Sea</h1>
    <p>Fresh Catch Fish Tacos</p>
    <a href="#" class="btn">View Today’s Menu</a>
  </div>
</div>

<div class="section">
  <h2>Fresh from the Bandon Coast</h2>
  <p>Prepared daily using locally sourced seafood, crafted right on the waterfront.</p>
</div>

<div class="section">
  <div class="features">
    <div class="feature">🌊 Caught Local</div>
    <div class="feature">👨‍🍳 Made Fresh Daily</div>
    <div class="feature">⭐ Customer Favorite</div>
  </div>
</div>

<div class="section">
  <img src="YOUR_TACO_IMAGE_2.jpg" class="image">
</div>

<div class="section actions">
  <a href="#">📍 Get Directions</a>
  <a href="#">📞 Call Now</a>
  <a href="#">📖 View Menu</a>
  <a href="#">🔥 Today’s Specials</a>
</div>

</body>
</html>
